services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-words_trainer}
      POSTGRES_USER: ${POSTGRES_USER:-words_trainer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-words_trainer_dev}
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 2s
      timeout: 3s
      retries: 20
    volumes:
      - words_trainer_pgdata:/var/lib/postgresql/data

volumes:
  words_trainer_pgdata:
